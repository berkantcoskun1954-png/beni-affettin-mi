<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beni Affettin mi?</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; font-family: Georgia, 'Times New Roman', serif;
      background: radial-gradient(circle at top, #fff7ef 0%, #fff2e8 45%, #fce7dc 100%);
      display: flex; align-items: center; justify-content: center; padding: 24px; color: #3b2a25;
    }
    .page { width: 100%; max-width: 620px; text-align: center; position: relative; }
    .heart-top { font-size: 30px; color: #ec8f86; margin-bottom: 12px; animation: pulse 1.3s infinite; }
    h1 { font-size: clamp(42px, 8vw, 68px); font-weight: 700; margin-bottom: 28px; letter-spacing: -1px; }
    .main-photo {
      width: min(430px, 90vw); height: 340px; object-fit: cover; border-radius: 10px;
      display: block; margin: 0 auto 34px; box-shadow: 0 10px 24px rgba(77, 45, 34, .12);
    }
    .buttons { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
    button {
      width: 230px; max-width: 42vw; min-width: 145px; border: 0; border-radius: 9px;
      padding: 17px 28px; font-size: 30px; font-family: Georgia, 'Times New Roman', serif;
      color: white; background: linear-gradient(135deg, #ed8a8b, #e67275);
      cursor: pointer; box-shadow: 0 8px 17px rgba(214, 88, 91, .24); transition: transform .18s, filter .18s;
    }
    button:hover { transform: translateY(-3px) scale(1.03); filter: brightness(1.03); }
    .side-heart { position: absolute; color: #efa9a0; font-size: 42px; opacity: .75; }
    .left { left: 20px; top: 255px; transform: rotate(-18deg); }
    .right { right: 20px; top: 255px; transform: rotate(18deg); }
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,.76); display: none; align-items: center;
      justify-content: center; padding: 22px; z-index: 10;
    }
    .modal.show { display: flex; }
    .popup {
      background: #fff8f1; border-radius: 10px; width: min(590px, 94vw); overflow: hidden;
      border: 6px solid #fff8f1; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,.35);
      animation: pop .22s ease-out;
    }
    .popup img { width: 100%; max-height: 72vh; object-fit: cover; display: block; }
    .love { padding: 18px 0 16px; color: #ee8e8b; font-size: 30px; font-family: Arial, sans-serif; font-weight: 600; }
    .close {
      position: absolute; top: 8px; right: 13px; color: white; font-size: 34px; font-family: Arial, sans-serif;
      cursor: pointer; text-shadow: 0 2px 6px rgba(0,0,0,.45); user-select: none;
    }
    @keyframes pop { from { transform: scale(.9); opacity: .2; } to { transform: scale(1); opacity: 1; } }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.16); } }
    @media (max-width: 480px) {
      .main-photo { height: 285px; } .buttons { gap: 14px; } button { font-size: 25px; padding: 15px 18px; }
      .side-heart { display:none; }
    }
  </style>
</head>
